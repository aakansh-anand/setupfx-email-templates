<!-- Admin Password Changed - Content Fragment -->
<!-- Injected into base-template.html via {{content}} -->

<!-- Icon -->
<tr>
  <td style="padding: 40px 48px 24px; text-align: left">
    <div
      style="
        width: 80px;
        height: 80px;
        background-color: #f0fdf4;
        border-radius: 30px;
        display: inline-block;
        line-height: 80px;
        text-align: center;
      "
    >
      <span style="font-size: 40px; color: #14b8a6">✓</span>
    </div>
  </td>
</tr>

<!-- Content -->
<tr>
  <td style="padding: 0 64px 48px; text-align: left">
    <h1>Password Changed Successfully</h1>
    <p class="greeting">Hello {{user_name}},</p>
    <p class="p-main">
      Your admin account password has been changed successfully.
    </p>
    <p class="p-main" style="margin-bottom: 12px">
      If you made this change, no further action is required.
    </p>
    <p class="p-main">
      If you did not perform this action, please contact support immediately.
    </p>
  </td>
</tr>
