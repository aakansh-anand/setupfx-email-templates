<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password Request</title>
    <style type="text/css">
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");

      body {
        margin: 0;
        padding: 0;
        background-color: #f0fdfa;
        font-family: "Inter", Arial, sans-serif;
      }
      .wrapper {
        width: 100%;
        background-color: #f0fdfa;
      }
      .container {
        padding: 60px 0;
      }
      .main-table {
        width: 600px;
        background-color: #ffffff;
        border-radius: 40px;
        border: 1px solid #ccfbf1;
        box-shadow: 0 30px 60px -12px rgba(20, 184, 166, 0.12);
        margin: 0 auto;
        overflow: hidden;
      }

      /* Header */
      .header-logo {
        padding: 48px 48px 0;
        text-align: left;
      }
      .logo-link {
        text-decoration: none;
        font-size: 24px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.5px;
        display: inline-block;
      }
      .logo-teal {
        color: #14b8a6;
        margin-left: 2px;
      }

      /* Content Area */
      .content-padding {
        padding: 48px 64px;
      }
      .h1-title {
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
        margin: 0 0 16px;
        letter-spacing: -0.5px;
      }
      .greeting {
        padding-top: 25px;
        font-size: 16px;
        font-weight: 600;
        color: #0f172a;
        margin: 0 0 12px;
      }
      .p-main {
        font-size: 15px;
        line-height: 1.6;
        color: #475569;
        margin: 0 0 32px;
      }

      /* Button */
      .btn-container {
        margin: 32px 0 40px;
        text-align: left;
      }
      .btn {
        display: inline-block;
        padding: 22px 64px;
        background-color: #0f172a;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 100px;
        font-weight: 700;
        font-size: 16px;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
      }

      /* Signature */
      .sig-container {
        padding: 0 64px 48px;
      }
      .sig-table {
        width: 100%;
      }
      .sig-left {
        padding-bottom: 16px;
        text-align: left;
      }
      .sig-right {
        text-align: right;
      }
      .sig-name {
        font-size: 15px;
        font-weight: 700;
        color: #0f172a;
        margin: 0 0 2px;
      }
      .sig-email a {
        color: #14b8a6;
        text-decoration: none;
        font-size: 14px;
      }
      .sig-closing {
        font-size: 14px;
        color: #64748b;
        margin: 0;
      }
      .sig-team {
        font-size: 14px;
        font-weight: 700;
        color: #0f172a;
        margin: 0;
      }

      /* Footer */
      .copyright {
        font-size: 12px;
        color: #cbd5e1;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
      }

      @media only screen and (max-width: 600px) {
        .main-table {
          width: 100% !important;
          border-radius: 0 !important;
        }
        .content-padding {
          padding: 40px 24px !important;
        }
        .sig-container {
          padding: 0 24px 40px !important;
        }
        .btn {
          width: 100%;
          box-sizing: border-box;
        }
      }

      table {
        border-collapse: collapse;
      }
    </style>
    <!--[if mso]>
      <style type="text/css">
        table {
          mso-table-lspace: 0pt !important;
          mso-table-rspace: 0pt !important;
        }
      </style>
    <![endif]-->
  </head>
  <body>
    <table
      role="presentation"
      class="wrapper"
      border="0"
      cellspacing="0"
      cellpadding="0"
    >
      <tr>
        <td align="center" class="container">
          <table
            class="main-table"
            role="presentation"
            border="0"
            cellspacing="0"
            cellpadding="0"
          >
            <!-- Header -->
            <tr>
              <td class="header-logo">
                <a href="#" class="logo-link">
                  Setup<span class="logo-teal">FX</span>
                </a>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td class="content-padding">
                <h1 class="h1-title">Forgot Password ?</h1>
                <p class="greeting">Hello User,</p>
                <p class="p-main">
                  We received a request to reset your admin account password.
                  Use the link below to continue:
                </p>

                <div class="btn-container">
                  <a href="{reset_link}" class="btn">Reset Admin Password</a>
                </div>

                <p class="p-main" style="margin-bottom: 0">
                  If you did not request this, please ignore this email.
                </p>
              </td>
            </tr>

            <!-- Signature -->
            <tr>
              <td class="sig-container">
                <table
                  role="presentation"
                  class="sig-table"
                  border="0"
                  cellspacing="0"
                  cellpadding="0"
                >
                  <tr>
                    <td class="sig-left">
                      <p class="sig-name"></p>
                      <p class="sig-email">
                        <a href="mailto:chetan@setupfx.com"
                          >chetan@setupfx.com</a
                        >
                      </p>
                      <p class="sig-closing">Happy investing</p>
                    </td>
                  </tr>
                  <tr>
                    <td class="sig-right">
                      <p class="sig-team">Team : SetupFX Limited</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding: 0 48px 48px">
                <p class="copyright">&copy; 2026 SETUPFX LIMITED</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
