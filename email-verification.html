<!-- Email Verification - Content Fragment -->
<!-- Injected into base-template.html via {{content}} -->

<!-- Content -->
<tr>
  <td style="padding: 0 64px 48px; text-align: center;">
    <h1 style="font-size: 32px; letter-spacing: -1px; text-align: center;">Account Verification</h1>
    <p class="p-main" style="font-size: 16px; line-height: 1.7; margin-bottom: 48px; text-align: center;">
      Please enter the 6-digit verification code below to secure
      your account and continue.
    </p>

    <!-- OTP Row -->
    <table
      role="presentation"
      align="center"
      border="0"
      cellspacing="0"
      cellpadding="0"
    >
      <tr>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_1}}</div></td>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_2}}</div></td>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_3}}</div></td>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_4}}</div></td>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_5}}</div></td>
        <td style="padding: 0 4px;"><div class="otp-digit">{{otp_6}}</div></td>
      </tr>
    </table>

    <p style="font-size: 14px; color: #94a3b8; margin: 48px 0 0; text-align: center;">
      This code is valid for 10 minutes. If you didn't request this,
      you can safely ignore this email.
    </p>
  </td>
</tr>
