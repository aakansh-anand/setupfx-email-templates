<!-- Client Reset Password - Content Fragment -->
<!-- Injected into base-template.html via {{content}} -->

<!-- Content -->
<tr>
  <td class="content-padding">
    <h1>Reset Your Password</h1>
    <p class="greeting">Hello {{user_name}},</p>
    <p class="p-main">
      We received a request to reset your account password. Please
      use the link below to proceed:
    </p>

    <div class="btn-container">
      <a href="{{reset_link}}" class="btn" style="padding: 22px 64px; background-color: #14b8a6;">Reset Password</a>
    </div>

    <p class="p-main" style="margin-bottom: 0;">
      If you did not request this, you can safely ignore this email.
    </p>
  </td>
</tr>
