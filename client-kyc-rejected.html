<!-- KYC Rejected - Content Fragment -->
<!-- Injected into base-template.html via {{content}} -->

<!-- Icon -->
<tr>
  <td style="padding: 40px 48px 24px; text-align: left;">
    <div style="width: 80px; height: 80px; background-color: #fee2e2; border-radius: 30px; display: inline-block; line-height: 80px; text-align: center;">
      <span style="font-size: 40px; color: #ef4444;">✕</span>
    </div>
  </td>
</tr>

<!-- Content -->
<tr>
  <td style="padding: 0 64px 48px; text-align: left;">
    <h1>KYC Rejected</h1>
    <p class="greeting">Hello {{user_name}},</p>
    <p class="p-main" style="margin-bottom: 24px;">
      Unfortunately, your KYC verification was rejected for the
      following reason:
    </p>

    <div class="reject-box">
      <div class="reject-label">Reason</div>
      <p class="reject-reason">{{reason}}</p>
    </div>

    <p class="p-main" style="margin-bottom: 24px;">
      Please re-upload valid documents to complete your
      verification.
    </p>

    <div class="btn-container" style="margin-top: 8px;">
      <a href="{{kyc_link}}" class="btn" style="padding: 18px 40px; background-color: #0f172a; font-size: 15px;">Re-upload Documents</a>
    </div>
  </td>
</tr>
