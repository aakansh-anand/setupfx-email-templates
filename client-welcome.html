<!-- Client Welcome - Content Fragment -->
<!-- Injected into base-template.html via {{content}} -->

<!-- Content -->
<tr>
  <td style="padding: 48px 64px; text-align: left;">
    <h1 style="font-size: 32px; letter-spacing: -1px;">Welcome to SetupFX</h1>
    <p class="greeting" style="font-size: 18px;">Hello {{user_name}},</p>
    <p class="p-main" style="font-size: 16px; line-height: 1.7;">
      Your account has been registered successfully. You can now
      access your client portal using your registered credentials.
    </p>

    <div class="btn-container" style="margin: 32px 0 0;">
      <a href="{{login_link}}" class="btn" style="background-color: #14b8a6;">Login to Client Portal</a>
    </div>
  </td>
</tr>
